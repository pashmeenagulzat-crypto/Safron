<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password – Safron</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="reset-password">

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="auth-logo-text">🌸 Safron</a>
    </div>

    <div style="text-align:center;font-size:48px;margin-bottom:12px">🔒</div>
    <h2 class="auth-title" style="text-align:center">Reset Password</h2>
    <p class="auth-subtitle" style="text-align:center">Enter the OTP sent to your mobile and set a new password.</p>

    <div id="demoOtpInfo" class="alert alert-info" style="display:none"></div>
    <div class="alert" id="resetAlert" style="display:none;margin-top:10px"></div>

    <form id="resetForm" novalidate style="margin-top:16px">
      <div class="form-group">
        <label class="form-label">OTP</label>
        <input type="text" name="otp" class="form-control" placeholder="6-digit OTP" maxlength="6" inputmode="numeric">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat new password">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>

    <div class="auth-switch"><a href="login.html">← Back to Login</a></div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
