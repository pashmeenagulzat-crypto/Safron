<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Safron/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Safron – Premium Kashmiri Products</title>
    <meta name="description" content="Pure Kashmiri Saffron, Dry Fruits, Wild Honey & Himalayan Herbs. 100% authentic, hand-picked and certified." />
    <!-- SPA redirect from 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var url = redirect.slice(redirect.indexOf('?') + 1).replace(/~and~/g, '&');
          history.replaceState(null, null, url || '/');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
