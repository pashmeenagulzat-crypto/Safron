<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – Safron</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="signup">

<div class="auth-page">
  <div class="auth-card" style="max-width:460px">
    <div class="auth-logo">
      <a href="index.html" class="auth-logo-text">🌸 Safron</a>
      <div style="font-size:11px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px">Kashmir's Finest</div>
    </div>

    <h2 class="auth-title">Create Account</h2>
    <p class="auth-subtitle">Join thousands of happy customers</p>

    <div class="alert" id="signupAlert" style="display:none"></div>

    <form id="signupForm" novalidate>
      <!-- Full name -->
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" name="fullname" class="form-control" placeholder="Enter your full name" autocomplete="name">
        <div class="form-error" id="nameError" style="display:none"></div>
      </div>

      <!-- Mobile -->
      <div class="form-group">
        <label class="form-label">Mobile Number *</label>
        <input type="tel" name="mobile" class="form-control" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric" autocomplete="tel">
        <div class="form-error" id="mobileError" style="display:none"></div>
        <div class="form-hint">OTP will be sent to this number</div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email (optional)</label>
        <input type="email" name="email" class="form-control" placeholder="your@email.com" autocomplete="email">
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" autocomplete="new-password">
        <div class="form-error" id="passwordError" style="display:none"></div>
      </div>

      <!-- Confirm -->
      <div class="form-group">
        <label class="form-label">Confirm Password *</label>
        <input type="password" name="confirmPassword" class="form-control" placeholder="Repeat password" autocomplete="new-password">
        <div class="form-error" id="confirmError" style="display:none"></div>
      </div>

      <button type="submit" class="btn btn-primary btn-block">✅ Create Account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
