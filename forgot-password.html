<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password – Safron</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="forgot">

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <a href="index.html" class="auth-logo-text">🌸 Safron</a>
    </div>

    <div style="text-align:center;font-size:48px;margin-bottom:12px">🔑</div>
    <h2 class="auth-title" style="text-align:center">Forgot Password</h2>
    <p class="auth-subtitle" style="text-align:center">Enter your mobile number and we'll send you an OTP to reset your password.</p>

    <div class="alert" id="forgotAlert" style="display:none"></div>

    <form id="forgotForm" novalidate>
      <div class="form-group">
        <label class="form-label">Mobile Number</label>
        <input type="tel" name="mobile" class="form-control" placeholder="10-digit mobile number" maxlength="10" inputmode="numeric">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send OTP</button>
    </form>

    <div class="auth-switch"><a href="login.html">← Back to Login</a></div>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
